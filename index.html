<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Fotbalgolf – Pavlišov</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;}
body{display:flex;flex-direction:column;align-items:center;font-family:'Nunito',sans-serif;touch-action:none;user-select:none;}
#game-shell{width:100%;max-width:400px;display:flex;flex-direction:column;overflow:hidden;background:#111;}
#topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#0d1f0d;border-bottom:2px solid #2a5a2a;flex-shrink:0;gap:8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#7ee87e;letter-spacing:2px;line-height:1.1;white-space:nowrap;flex-shrink:0;}
.logo span{display:block;font-size:0.46rem;color:#5a9a5a;letter-spacing:2px;margin-top:1px;}
.stats{display:flex;gap:10px;font-size:0.68rem;color:#aaa;text-align:center;flex-shrink:0;}
.stats b{display:block;color:#7ee87e;font-size:0.88rem;}
#canvas-wrap{position:relative;width:100%;flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
#powerbar-wrap{width:100%;padding:5px 14px 8px;background:#0d1f0d;border-top:2px solid #2a5a2a;flex-shrink:0;}
#powerbar-track{width:100%;height:13px;background:#1a2a1a;border-radius:7px;overflow:hidden;border:1px solid #2a4a2a;}
#powerbar-fill{height:100%;width:0%;background:linear-gradient(90deg,#4aee4a,#ffcc00,#ff3333);border-radius:7px;}
#hint{text-align:center;font-size:0.67rem;color:#4a7a4a;margin-top:3px;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.91);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;z-index:20;overflow-y:auto;}
#overlay h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#7ee87e;letter-spacing:4px;text-align:center;text-shadow:0 0 20px rgba(126,232,126,0.4);}
.sub{color:#888;font-size:0.75rem;letter-spacing:1px;}
.howto{background:#0d1f0d;border:1px solid #2a4a2a;border-radius:10px;padding:11px 18px;color:#ccc;font-size:0.78rem;line-height:2.1;max-width:270px;text-align:center;}
.scorebox{background:#0d1f0d;border:1px solid #2a4a2a;border-radius:10px;padding:9px 16px;width:265px;max-height:200px;overflow-y:auto;}
.scorebox div{display:flex;justify-content:space-between;font-size:0.78rem;color:#ccc;padding:3px 0;border-bottom:1px solid #1a3a1a;}
.scorebox div:last-child{border:none;}
.verdict{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px;}
.btn{background:#7ee87e;color:#0a1a0a;border:none;padding:12px 34px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 22px rgba(126,232,126,0.35);}
.btn:active{transform:scale(0.96);}
.btn-share{background:linear-gradient(135deg,#1da1f2,#0d6efd);color:#fff;border:none;padding:11px 28px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 18px rgba(29,161,242,0.4);display:flex;align-items:center;gap:8px;}
.btn-share:active{transform:scale(0.96);}
.site{color:#2a4a2a;font-size:0.63rem;letter-spacing:1px;}
#share-panel{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:340px;}
#share-preview{width:100%;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.5);border:2px solid #2a4a2a;}
.share-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;}
.sbtn{border:none;border-radius:10px;padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;color:#fff;}
.sbtn:active{transform:scale(0.96);}
.sbtn-save{background:linear-gradient(135deg,#7ee87e,#3aaa3a);color:#0a1a0a;}
.sbtn-wa{background:#25d366;}
.sbtn-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.sbtn-fb{background:#1877f2;}
</style>
</head>
<body>
<div id="game-shell">
<div id="topbar">
  <div class="logo">⚽ Fotbalgolf<span>SPORTPARK PAVLIŠOV</span></div>
  <div class="stats">
    <div>Jamka<br><b id="st-hole">1</b>/9</div>
    <div>Údery<br><b id="st-str">0</b></div>
    <div>Skóre<br><b id="st-score">0</b></div>
  </div>
</div>
<div id="canvas-wrap">
  <canvas id="gc"></canvas>
  <div id="overlay">
    <h1>⚽ MINI<br>FOTBALGOLF</h1>
    <div class="sub">SPORTPARK PAVLIŠOV</div>
    <div class="howto">
      👆 <b>Drž prst</b> – síla se mění sama<br>
      🎯 <b>Pusť</b> ve správný moment!<br>
      🏳️ Každá jamka <b>par 3</b>
    </div>
    <button class="btn" id="startBtn">HRÁT!</button>
    <div class="site">fotbalgolfpavlisov.cz</div>
  </div>
</div>
<div id="powerbar-wrap">
  <div id="powerbar-track"><div id="powerbar-fill"></div></div>
  <div id="hint">Drž → síla se mění → pusť ve správný moment!</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');
let W,H;

function resize(){
  // Výška = celé okno prohlížeče
  const sh = window.innerHeight;
  const shell = document.getElementById('game-shell');
  // Nastavit výšku shellu = výška okna
  shell.style.height = sh + 'px';
  // Canvas rozměry z wrapperu (po nastavení výšky shellu)
  const r = wrap.getBoundingClientRect();
  W = r.width;
  H = r.height;
  canvas.width  = W;
  canvas.height = H;
}

resize();
window.addEventListener('resize', ()=>{
  resize();
  if(gameState !== 'menu') buildHole();
});

// ═══════════════════════════════════════════════════════
//  HOLE DEFINITIONS
//  All coords are in PIXELS relative to canvas (W×H).
//  Fairway = simple rectangle {x,y,w,h} – always reliable.
//  Ball spawns at bottom-centre, hole at top-centre.
//  Obstacles use % of fairway size so they always fit.
//  Each hole guarantees a gap of at least ballR*4 beside obstacles.
// ═══════════════════════════════════════════════════════

// We define holes in a normalised space 0-1 of the fairway rect.
// fw: {x%W, y%H, w%W, h%H}  – but we compute at runtime from W,H.

const HOLE_DEFS = [
  // ── 1: Kopce – 3 mounds zigzag ──────────────────────
  {
    name:'Kopce',
    shape:'straight',   // full-width straight corridor
    obs:[
      {t:'mound', fx:0.62, fy:0.70, frx:0.22, fry:0.055},
      {t:'mound', fx:0.35, fy:0.52, frx:0.22, fry:0.055},
      {t:'mound', fx:0.60, fy:0.34, frx:0.22, fry:0.055},
    ]
  },
  // ── 2: Kameny & Krtinci – fixed scattered rocks + molehills ──
  {
    name:'Kameny & Krtinci',
    shape:'straight',
    obs:[
      {t:'rock',     fx:0.22, fy:0.22, fr:0.062},
      {t:'rock',     fx:0.68, fy:0.30, fr:0.058},

      {t:'log', fx1:0.55,fy1:0.20, fx2:0.95,fy2:0.08, fr:0.042},

  // Vert: fx=0.00..0.58, fy=0.40..1.00 | Horiz: fx=0.00..1.00, fy=0.00..0.50
  {
    name:'Baliky',
    shape:'L-right',
    obs:[

      {t:'hay', fx:0.08, fy:0.55, fr:0.085},

      {t:'hay', fx:0.78, fy:0.28, fr:0.085},
    ]
  },
];

// ═══════════════════════════════════════════════════════

let ball={x:0,y:0,vx:0,vy:0,r:0};

// ═══════════════════════════════════════════════════════
//  BUILD HOLE
// ═══════════════════════════════════════════════════════
function buildHole(){
  const def=HOLE_DEFS[holeIdx];

  // Fairway: centred, 72% of canvas width, full height minus small margin
  const FW = Math.round(W*0.72);
  const FH = Math.round(H*0.96);
  fw = {x:(W-FW)/2, y:(H-FH)/2, w:FW, h:FH};

  ball.r = Math.round(W*0.038);

  // L-shape: we split the canvas into a vertical strip (bottom) + horizontal strip (top)
  // L-right: vertical strip on left, horizontal extends right
  // L-left:  vertical strip on right, horizontal extends left
  const shape = def.shape || 'straight';
  if(shape==='L-right'){
    // Vertical corridor: left half of canvas, bottom 60%
    // Horizontal corridor: full width, top 45%
    const vx=fw.x, vy=fw.y+fw.h*0.40, vw=fw.w*0.58, vh=fw.h*0.62;
    const hx=fw.x, hy=fw.y,            hw=fw.w,       hh=fw.h*0.50;
    fw.Lshape={shape:'L-right', vx,vy,vw,vh, hx,hy,hw,hh};
    ball.x = vx+vw/2;
    ball.y = vy+vh-ball.r*3;
    holePos = {x:hx+hw*0.80, y:hy+hh*0.38};
  } else if(shape==='L-left'){
    // Vertical corridor: right half, bottom 60%
    // Horizontal corridor: full width, top 45%
    const vw=fw.w*0.58, vh=fw.h*0.62;
    const vx=fw.x+fw.w-vw, vy=fw.y+fw.h*0.40;
    const hx=fw.x, hy=fw.y, hw=fw.w, hh=fw.h*0.50;
    fw.Lshape={shape:'L-left', vx,vy,vw,vh, hx,hy,hw,hh};
    ball.x = vx+vw/2;
    ball.y = vy+vh-ball.r*3;
    holePos = {x:hx+hw*0.18, y:hy+hh*0.38};
  } else {
    fw.Lshape=null;
    ball.x = fw.x+fw.w/2;
    ball.y = fw.y+fw.h-ball.r*3;
    holePos = {x:fw.x+fw.w/2, y:fw.y+ball.r*3.5};
  }
  ball.vx=0; ball.vy=0;

  // For L-shapes, obstacles use the full fw.w/fw.h but base from fw.x/fw.y
  // fx/fy fractions work within the full canvas fw rect
  // Scale obstacles from fractional coords to pixels
  scaledObs = def.obs.map(o=>{
    if(o.t==='mound') return {t:'mound',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h,
      rx: o.frx*fw.w,    ry: o.fry*fw.h};
    if(o.t==='log') return {t:'log',
      x1: fw.x+o.fx1*fw.w, y1: fw.y+o.fy1*fw.h,
      x2: fw.x+o.fx2*fw.w, y2: fw.y+o.fy2*fw.h,
      r:  o.fr*fw.w};
    if(o.t==='pole') return {t:'log',
      x1: fw.x+o.fx*fw.w,  y1: fw.y+o.fy1*fw.h,
      x2: fw.x+o.fx*fw.w,  y2: fw.y+o.fy2*fw.h,
      r:  o.fr*fw.w};
    if(o.t==='drum') return {t:'drum',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h, r: o.fr*fw.w};
    if(o.t==='rock') return {t:'rock',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h, r: o.fr*fw.w};
    if(o.t==='tyre') return {t:'tyre',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h, r: o.fr*fw.w};
    if(o.t==='tree') return {t:'tree',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h, r: o.fr*fw.w};
    if(o.t==='molehill') return {t:'molehill',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h,
      rx: o.frx*fw.w,    ry: o.fry*fw.h};
    if(o.t==='hay') return {t:'hay',
      x: fw.x+o.fx*fw.w, y: fw.y+o.fy*fw.h, r: o.fr*fw.w};
  }).filter(Boolean);

  particles=[]; successTick=0; powerOsc=0; powerDir=1; strokes=0;
  updateHUD();
}

// Generate 5 rocks + 2 molehills, avoiding ball start/hole zones
function genRocksMoles(){
  const obs=[];
  const safe=0.14; // keep clear of top/bottom edge (ball & hole area)
  const minGap=0.13; // minimum distance between obstacle centres (fractional)

  function overlaps(fx,fy,others){
    for(const o of others){
      const dx=fx-(o.fx||0), dy=fy-(o.fy||0);
      if(Math.hypot(dx,dy)<minGap) return true;
    }
    return false;
  }

  function place(count, type, frx, fry){
    let tries=0;
    while(obs.filter(o=>o.t===type).length < count && tries<200){
      tries++;
      const fx=0.15+Math.random()*0.70;
      const fy=safe+0.06+Math.random()*(1-safe*2-0.12);
      if(overlaps(fx,fy,obs)) continue;
      if(type==='rock')     obs.push({t:'rock', fx, fy, fr:0.055+Math.random()*0.025});
      if(type==='molehill') obs.push({t:'molehill', fx, fy, frx:frx*(0.9+Math.random()*0.2), fry:fry*(0.9+Math.random()*0.2)});
    }
  }

  place(5,'rock');
  place(2,'molehill',0.13,0.045);
  return obs;
}

function initHole(){buildHole();gameState='aiming';}

function updateHUD(){
  document.getElementById('st-hole').textContent=holeIdx+1;
  document.getElementById('st-str').textContent=strokes;
  const el=document.getElementById('st-score');
  el.textContent=totalDiff>=0?'+'+totalDiff:''+totalDiff;
  el.style.color=totalDiff<0?'#7ee87e':totalDiff>0?'#ff6666':'#fff';
}

// ═══════════════════════════════════════════════════════
//  PHYSICS – robust rect boundary
// ═══════════════════════════════════════════════════════
function stepPhysics(){
  const SUBSTEPS=5;
  for(let s=0;s<SUBSTEPS;s++){
    ball.x+=ball.vx/SUBSTEPS;
    ball.y+=ball.vy/SUBSTEPS;
    clampToFairway();
  }
  ball.vx*=0.980; ball.vy*=0.980;

  for(const o of scaledObs){
    if(o.t==='log')   colLog(o);
    else if(o.t==='mound') colMound(o);
    else if(o.t==='drum')  colCircle(o,true);
    else if(o.t==='rock')  colCircle(o,false);
    else if(o.t==='tyre')  colCircle(o,true);
    else if(o.t==='tree')  colCircle(o,false);
    else if(o.t==='molehill') colMound(o);
    else if(o.t==='hay')      colCircle(o,false);
  }

  if(Math.hypot(ball.vx,ball.vy)<0.06){ball.vx=0;ball.vy=0;}

  if(Math.hypot(ball.x-holePos.x,ball.y-holePos.y)<ball.r*1.5+4
     && Math.hypot(ball.vx,ball.vy)<6) onHoled();
}

// Boundary – handles straight rect and L-shape corridors
function clampToFairway(){
  const r=ball.r;
  const L=fw.Lshape;
  if(!L){
    const left=fw.x+r, right=fw.x+fw.w-r;
    const top=fw.y+r,  bot=fw.y+fw.h-r;
    if(ball.x<left){  ball.x=left;  if(ball.vx<0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
    if(ball.x>right){ ball.x=right; if(ball.vx>0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
    if(ball.y<top){   ball.y=top;   if(ball.vy<0){ball.vy=-ball.vy*0.6;ball.vx*=0.6;}}
    if(ball.y>bot){   ball.y=bot;   if(ball.vy>0){ball.vy=-ball.vy*0.6;ball.vx*=0.6;}}
    return;
  }

  // ── L-shape boundary ──────────────────────────────────
  // Two rects: horiz (hx,hy,hw,hh) on top, vert (vx,vy,vw,vh) on bottom.
  // A point is "inside" the L if it's inside EITHER rect.
  // Strategy: find which rect the ball is primarily in, clamp only relevant walls.
  // The overlap zone (bend) is inside both – no sidewalls enforced there.

  const inH = (ball.x >= L.hx && ball.x <= L.hx+L.hw &&
               ball.y >= L.hy && ball.y <= L.hy+L.hh);
  const inV = (ball.x >= L.vx && ball.x <= L.vx+L.vw &&
               ball.y >= L.vy && ball.y <= L.vy+L.vh);

  // Top wall – only when in horiz section
  if(inH || ball.y < L.hy+r){
    if(ball.y < L.hy+r){ ball.y=L.hy+r; if(ball.vy<0){ball.vy=-ball.vy*0.6;ball.vx*=0.6;}}
  }
  // Bottom wall – only when in vert section
  const vBot = L.vy+L.vh-r;
  if(ball.y > vBot){ ball.y=vBot; if(ball.vy>0){ball.vy=-ball.vy*0.6;ball.vx*=0.6;}}

  // Left wall
  if(inV && !inH){
    // purely in vert: clamp to vert left wall
    if(ball.x < L.vx+r){ ball.x=L.vx+r; if(ball.vx<0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
  } else {
    // in horiz (or bend): clamp to full horiz left wall
    if(ball.x < L.hx+r){ ball.x=L.hx+r; if(ball.vx<0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
  }

  // Right wall
  if(inV && !inH){
    // purely in vert: clamp to vert right wall
    if(ball.x > L.vx+L.vw-r){ ball.x=L.vx+L.vw-r; if(ball.vx>0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
  } else {
    // in horiz (or bend): clamp to full horiz right wall
    if(ball.x > L.hx+L.hw-r){ ball.x=L.hx+L.hw-r; if(ball.vx>0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
  }

  // Inner wall of the L – the wall that closes off the empty corner
  // L-right: vert is LEFT side → inner wall is RIGHT edge of vert when ball is BELOW horiz bottom
  // L-left:  vert is RIGHT side → inner wall is LEFT edge of vert when ball is BELOW horiz bottom
  const belowHoriz = ball.y > L.hy+L.hh;
  if(belowHoriz){
    if(L.shape==='L-right'){
      // right wall of vert corridor (vert is left side)
      if(ball.x > L.vx+L.vw-r){ ball.x=L.vx+L.vw-r; if(ball.vx>0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
    } else {
      // left wall of vert corridor (vert is right side)
      if(ball.x < L.vx+r){ ball.x=L.vx+r; if(ball.vx<0){ball.vx=-ball.vx*0.6;ball.vy*=0.6;}}
    }
  }
}

function segNearest(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  const t=l2>0?Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2)):0;
  const cx=ax+t*dx,cy=ay+t*dy;
  const ex=px-cx,ey=py-cy,dist=Math.hypot(ex,ey)||0.001;
  return{dist,nx:ex/dist,ny:ey/dist,cx,cy};
}

function colLog(o){
  const s=segNearest(ball.x,ball.y,o.x1,o.y1,o.x2,o.y2);
  const min=o.r+ball.r;
  if(s.dist<min){
    ball.x=s.cx+s.nx*(min+0.5); ball.y=s.cy+s.ny*(min+0.5);
    const dot=ball.vx*s.nx+ball.vy*s.ny;
    if(dot<0){ball.vx-=1.55*dot*s.nx;ball.vy-=1.55*dot*s.ny;ball.vx*=0.62;ball.vy*=0.62;}
    spawnP(ball.x,ball.y,'#8B5E3C',3);
  }
}
function colMound(o){
  const dx=ball.x-o.x,dy=ball.y-o.y,dist=Math.hypot(dx,dy)||0.001;
  const eff=(o.rx+o.ry)/2+ball.r;
  if(dist<eff){
    const nx=dx/dist,ny=dy/dist;
    ball.x=o.x+nx*(eff+0.5); ball.y=o.y+ny*(eff+0.5);
    const dot=ball.vx*nx+ball.vy*ny;
    if(dot<0){ball.vx-=1.55*dot*nx;ball.vy-=1.55*dot*ny;ball.vx*=0.65;ball.vy*=0.65;}
    spawnP(ball.x,ball.y,'#c8a84a',4);
  }
}
function colCircle(o,bouncy){
  const dx=ball.x-o.x,dy=ball.y-o.y,dist=Math.hypot(dx,dy)||0.001;
  const min=o.r+ball.r;
  if(dist<min){
    const nx=dx/dist,ny=dy/dist;
    ball.x=o.x+nx*(min+0.5); ball.y=o.y+ny*(min+0.5);
    const dot=ball.vx*nx+ball.vy*ny;
    if(dot<0){const res=bouncy?0.82:0.58;ball.vx=(ball.vx-2*dot*nx)*res;ball.vy=(ball.vy-2*dot*ny)*res;}
    spawnP(ball.x,ball.y,bouncy?'#ffcc00':'#888',5);
  }
}

function onHoled(){
  gameState='holed'; successTick=140;
  const diff=strokes-3; totalDiff+=diff;
  scoreLog.push({hole:holeIdx+1,strokes,diff});
  spawnP(ball.x,ball.y,'#7ee87e',30);
  ball.vx=0;ball.vy=0;
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
function spawnP(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col,r:2+Math.random()*3});
  }
}
function tickP(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life-=0.028;});
}

// ── helper: roundRect path without fill/stroke ──────────
function roundRectPath(x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ── Tree draw ────────────────────────────────────────────
function drawTree(o){
  ctx.save();
  const x=o.x, y=o.y, r=o.r;
  // 3 layered triangles (spruce shape)
  const layers=[
    {yOff:-r*1.1, w:r*0.7,  h:r*0.7},
    {yOff:-r*0.5, w:r*0.95, h:r*0.65},
    {yOff: r*0.1, w:r*1.15, h:r*0.70},
  ];
  layers.forEach((l,i)=>{
    const alpha=1-i*0.05;
    const g=ctx.createLinearGradient(x-l.w,y+l.yOff,x+l.w,y+l.yOff+l.h);
    g.addColorStop(0,'#4a7a3a');g.addColorStop(0.5,'#5a9a4a');g.addColorStop(1,'#3a6a2a');
    ctx.globalAlpha=alpha;
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(x, y+l.yOff);
    ctx.lineTo(x+l.w, y+l.yOff+l.h);
    ctx.lineTo(x-l.w, y+l.yOff+l.h);
    ctx.closePath();ctx.fill();
    // dark edge
    ctx.strokeStyle='#2a4a1a';ctx.lineWidth=0.8;ctx.stroke();
  });
  // trunk
  ctx.globalAlpha=1;
  const tg=ctx.createLinearGradient(x-r*0.1,y+r*0.55,x+r*0.1,y+r*0.55);
  tg.addColorStop(0,'#8B5E3C');tg.addColorStop(1,'#6b3a1a');
  ctx.fillStyle=tg;
  ctx.fillRect(x-r*0.1,y+r*0.55,r*0.2,r*0.35);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a1a0a';
  ctx.fillRect(0,0,W,H);

  // ── Fairway ──────────────────────────────────────────
  const L=fw.Lshape;
  const rad=Math.round(fw.w*0.09);
  const grad=ctx.createLinearGradient(fw.x,fw.y,fw.x,fw.y+fw.h);
  grad.addColorStop(0,'#4db84d');
  grad.addColorStop(1,'#3a9a3a');

  function drawFWPath(fill){
    ctx.beginPath();
    if(!L){
      ctx.roundRect(fw.x,fw.y,fw.w,fw.h,rad);
    } else {
      // Draw L-shape as union of two rounded rects via path
      // horizontal rect
      roundRectPath(L.hx,L.hy,L.hw,L.hh,rad);
      // vertical rect
      roundRectPath(L.vx,L.vy,L.vw,L.vh,rad);
    }
    if(fill) ctx.fill(); else ctx.stroke();
  }

  // fill
  ctx.save();
  ctx.fillStyle=grad;
  if(!L){
    ctx.beginPath();ctx.roundRect(fw.x,fw.y,fw.w,fw.h,rad);ctx.fill();
    ctx.clip();
  } else {
    // fill both rects
    ctx.fillStyle='#3a9a3a';
    ctx.beginPath();ctx.roundRect(L.hx,L.hy,L.hw,L.hh,rad);ctx.fill();
    ctx.beginPath();ctx.roundRect(L.vx,L.vy,L.vw,L.vh,rad);ctx.fill();
    // gradient overlay
    ctx.globalAlpha=0.3;
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.roundRect(L.hx,L.hy,L.hw,L.hh,rad);ctx.fill();
    ctx.beginPath();ctx.roundRect(L.vx,L.vy,L.vw,L.vh,rad);ctx.fill();
    ctx.globalAlpha=1;
  }
  // stripes
  ctx.globalAlpha=0.05;
  for(let i=0;i<H;i+=22){
    ctx.fillStyle=i%44===0?'#5aba5a':'#2a8a2a';
    ctx.fillRect(fw.x,fw.y+i,fw.w,11);
  }
  ctx.globalAlpha=1;
  ctx.restore();

  // border – L-shape drawn as clipped polygon to avoid visible join lines
  ctx.save();
  ctx.strokeStyle='#1e5a1e';ctx.lineWidth=3;
  if(!L){
    ctx.beginPath();ctx.roundRect(fw.x,fw.y,fw.w,fw.h,rad);ctx.stroke();
  } else {
    // Draw true L-shape outline using canvas clip trick:
    // Fill both rects, then stroke only the OUTER edge using composite
    ctx.globalCompositeOperation='source-over';
    // Clip to union of both rects then stroke a slightly-inset border
    ctx.beginPath();
    ctx.roundRect(L.hx,L.hy,L.hw,L.hh,rad);
    ctx.roundRect(L.vx,L.vy,L.vw,L.vh,rad);
    ctx.clip('evenodd');
    // stroke a big rectangle that covers both – only visible at outer edges due to clip
    ctx.strokeStyle='#1e5a1e';ctx.lineWidth=7;
    ctx.beginPath();
    ctx.roundRect(L.hx,L.hy,L.hw,L.hh,rad);
    ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(L.vx,L.vy,L.vw,L.vh,rad);
    ctx.stroke();
  }
  ctx.restore();

  // ── Obstacles ────────────────────────────────────────
  scaledObs.forEach(o=>{
    if(o.t==='mound') drawMound(o);
    else if(o.t==='log') drawLog(o);
    else if(o.t==='drum') drawDrum(o);
    else if(o.t==='rock') drawRock(o);
    else if(o.t==='tyre') drawTyre(o);
    else if(o.t==='molehill') drawMolehill(o);
    else if(o.t==='tree') drawTree(o);
    else if(o.t==='hay')  drawHay(o);
  });

  // ── Hole ─────────────────────────────────────────────
  drawHole();

  // ── Aim/power indicator ──────────────────────────────
  if(gameState==='aiming'){
    if(touchActive){
      const len=powerOsc*fw.w*0.7;
      const nx=Math.cos(mouseAngle),ny=Math.sin(mouseAngle);
      const ex=ball.x+nx*len, ey=ball.y+ny*len;
      const hue=Math.round(120-powerOsc*120);
      ctx.save();
      ctx.strokeStyle=`hsl(${hue},100%,55%)`;
      ctx.lineWidth=3; ctx.globalAlpha=0.88;
      ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(ex,ey);ctx.stroke();
      const px=-ny,py=nx,a=ball.r*1.1;
      ctx.beginPath();
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-nx*a+px*a*0.6,ey-ny*a+py*a*0.6);
      ctx.lineTo(ex-nx*a-px*a*0.6,ey-ny*a-py*a*0.6);
      ctx.closePath();ctx.fillStyle=`hsl(${hue},100%,55%)`;ctx.fill();
      ctx.restore();
    } else if(Math.hypot(ball.vx,ball.vy)<0.1){
      // guide arrow toward hole
      const dx=holePos.x-ball.x,dy=holePos.y-ball.y,d=Math.hypot(dx,dy);
      if(d>20){
        ctx.save();
        ctx.globalAlpha=0.22+0.1*Math.sin(flagWave*3);
        ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.setLineDash([4,5]);
        ctx.beginPath();
        ctx.moveTo(ball.x+dx/d*14,ball.y+dy/d*14);
        ctx.lineTo(ball.x+dx/d*55,ball.y+dy/d*55);
        ctx.stroke();ctx.setLineDash([]);
        ctx.restore();
      }
    }
  }

  // ── Ball ─────────────────────────────────────────────
  drawBall();

  // ── Particles ────────────────────────────────────────
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  });

  // ── Holed message ────────────────────────────────────
  if(gameState==='holed'){
    const alpha=Math.min(1,successTick/40);
    const last=scoreLog[scoreLog.length-1];
    let msg='',col='#fff';
    if(last.diff<=-2){msg='🦅 EAGLE!';col='#7ee87e';}
    else if(last.diff===-1){msg='🐦 BIRDIE!';col='#aaffaa';}
    else if(last.diff===0){msg='✅ PAR';col='#ffcc00';}
    else if(last.diff===1){msg='😅 BOGEY';col='#ffaa55';}
    else{msg=`😬 +${last.diff}`;col='#ff6666';}
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.font=`bold ${Math.round(W*0.12)}px Bebas Neue`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=22;
    ctx.fillText(msg,W/2,H/2);
    ctx.restore();
  }

  // hole name
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font=`${Math.round(W*0.032)}px Nunito`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText(`Jamka ${holeIdx+1}: ${HOLE_DEFS[holeIdx].name}`,W-8,H-4);
}

// ── Draw helpers ─────────────────────────────────────────
function drawLog(o){
  const dx=o.x2-o.x1,dy=o.y2-o.y1,len=Math.hypot(dx,dy);
  if(len<1)return;
  ctx.save();
  ctx.translate(o.x1,o.y1);ctx.rotate(Math.atan2(dy,dx));
  const g=ctx.createLinearGradient(0,-o.r,0,o.r);
  g.addColorStop(0,'#c8783a');g.addColorStop(0.45,'#a0522d');g.addColorStop(1,'#6b3318');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.roundRect(0,-o.r,len,o.r*2,o.r*0.9);ctx.fill();
  // end cap
  ctx.beginPath();ctx.arc(0,0,o.r,0,Math.PI*2);
  ctx.fillStyle='#d4a08a';ctx.fill();
  ctx.strokeStyle='#8B4513';ctx.lineWidth=1;ctx.stroke();
  for(let ri=1;ri<3;ri++){
    ctx.beginPath();ctx.arc(0,0,o.r*(ri/3),0,Math.PI*2);
    ctx.strokeStyle='rgba(100,50,20,0.3)';ctx.lineWidth=0.8;ctx.stroke();
  }
  ctx.restore();
}
function drawMound(o){
  const g=ctx.createRadialGradient(o.x-o.rx*0.2,o.y-o.ry*0.3,o.rx*0.08,o.x,o.y,o.rx);
  g.addColorStop(0,'#d4bc38');g.addColorStop(0.55,'#a89022');g.addColorStop(1,'#7a6814');
  ctx.beginPath();ctx.ellipse(o.x,o.y,o.rx,o.ry,0,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  // shine
  ctx.beginPath();ctx.ellipse(o.x-o.rx*0.18,o.y-o.ry*0.22,o.rx*0.3,o.ry*0.16,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,200,0.16)';ctx.fill();
}
function drawDrum(o){
  ctx.save();
  const g=ctx.createRadialGradient(o.x-o.r*0.22,o.y-o.r*0.22,4,o.x,o.y,o.r);
  g.addColorStop(0,'#555');g.addColorStop(0.5,'#222');g.addColorStop(1,'#111');
  ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='#7a6a4a';ctx.lineWidth=Math.round(o.r*0.14);ctx.stroke();
  ctx.beginPath();ctx.arc(o.x,o.y,o.r*0.44,0,Math.PI*2);
  ctx.fillStyle='#8B6914';ctx.fill();ctx.strokeStyle='#6b4a10';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(o.x,o.y,o.r*0.1,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    ctx.beginPath();ctx.arc(o.x+Math.cos(a)*o.r*0.29,o.y+Math.sin(a)*o.r*0.29,Math.max(2,o.r*0.06),0,Math.PI*2);
    ctx.fillStyle='#5a4a2a';ctx.fill();
  }
  ctx.restore();
}
function drawRock(o){
  ctx.save();ctx.translate(o.x,o.y);
  const g=ctx.createRadialGradient(-o.r*0.3,-o.r*0.3,o.r*0.1,0,0,o.r);
  g.addColorStop(0,'#bbb');g.addColorStop(1,'#555');
  ctx.beginPath();
  for(let i=0;i<7;i++){
    const a=i/7*Math.PI*2-Math.PI/2,r=o.r*(0.75+0.25*Math.sin(i*2.3));
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}
function drawTyre(o){
  ctx.save();
  const x=o.x, y=o.y, r=o.r;
  // outer tyre rubber
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  const og=ctx.createRadialGradient(x-r*0.25,y-r*0.28,r*0.1,x,y,r);
  og.addColorStop(0,'#4a4a4a');
  og.addColorStop(0.6,'#1e1e1e');
  og.addColorStop(1,'#0a0a0a');
  ctx.fillStyle=og;ctx.fill();
  // tread ring (slightly lighter)
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=r*0.18;ctx.stroke();
  // tread notches
  ctx.strokeStyle='#555';ctx.lineWidth=r*0.07;
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    const r1=r*0.82, r2=r*0.98;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*r1, y+Math.sin(a)*r1);
    ctx.lineTo(x+Math.cos(a)*r2, y+Math.sin(a)*r2);
    ctx.stroke();
  }
  // inner hole (rim)
  const inner=r*0.46;
  ctx.beginPath();ctx.arc(x,y,inner,0,Math.PI*2);
  const ig=ctx.createRadialGradient(x-inner*0.3,y-inner*0.3,inner*0.05,x,y,inner);
  ig.addColorStop(0,'#888');
  ig.addColorStop(0.5,'#555');
  ig.addColorStop(1,'#2a2a2a');
  ctx.fillStyle=ig;ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=1.5;ctx.stroke();
  // rim spokes
  ctx.strokeStyle='#777';ctx.lineWidth=r*0.06;
  for(let i=0;i<5;i++){
    const a=i/5*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*inner*0.15, y+Math.sin(a)*inner*0.15);
    ctx.lineTo(x+Math.cos(a)*inner*0.85, y+Math.sin(a)*inner*0.85);
    ctx.stroke();
  }
  // centre hub
  ctx.beginPath();ctx.arc(x,y,r*0.1,0,Math.PI*2);
  ctx.fillStyle='#444';ctx.fill();
  // shine highlight
  ctx.beginPath();ctx.arc(x-r*0.28,y-r*0.28,r*0.12,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fill();
  ctx.restore();
}
function drawMolehill(o){
  ctx.save();
  // shadow
  ctx.beginPath();ctx.ellipse(o.x+2,o.y+3,o.rx,o.ry*0.5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();
  // mound body – earthy brown gradient
  const g=ctx.createRadialGradient(o.x-o.rx*0.25,o.y-o.ry*0.35,o.rx*0.06, o.x,o.y,o.rx);
  g.addColorStop(0,'#a0724a');
  g.addColorStop(0.5,'#7a5230');
  g.addColorStop(1,'#4e3018');
  ctx.beginPath();ctx.ellipse(o.x,o.y,o.rx,o.ry,0,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  // dirt texture dots
  ctx.fillStyle='rgba(40,20,5,0.22)';
  for(let i=0;i<5;i++){
    const ax=o.x+(Math.sin(i*1.9)*0.5)*o.rx;
    const ay=o.y+(Math.cos(i*2.7)*0.4)*o.ry;
    ctx.beginPath();ctx.arc(ax,ay,o.rx*0.09,0,Math.PI*2);ctx.fill();
  }
  // hole opening at top
  ctx.beginPath();ctx.ellipse(o.x,o.y-o.ry*0.3,o.rx*0.28,o.ry*0.22,0,0,Math.PI*2);
  ctx.fillStyle='#1a0d00';ctx.fill();
  ctx.strokeStyle='#3a1e08';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}
function drawHay(o){
  const x=o.x, y=o.y, r=o.r;
  ctx.save();
  // Telo baliku – elipsa (valec zpredu)
  const gBody=ctx.createRadialGradient(x-r*0.2,y-r*0.2,r*0.05,x,y,r);
  gBody.addColorStop(0,'#e8c96a');
  gBody.addColorStop(0.5,'#c8a040');
  gBody.addColorStop(1,'#9a7020');
  ctx.fillStyle=gBody;
  ctx.beginPath();
  ctx.ellipse(x,y,r,r*0.82,0,0,Math.PI*2);
  ctx.fill();
  // Spirala na celu – 3 soustredne elipsy
  ctx.strokeStyle='rgba(100,65,10,0.55)';
  ctx.lineWidth=r*0.08;
  for(let i=1;i<=3;i++){
    ctx.beginPath();
    ctx.ellipse(x,y,r*0.28*i,r*0.22*i,0,0,Math.PI*2);
    ctx.stroke();
  }
  // Provazky kolem – 2 horizontalni pruhy
  const bandY=[y-r*0.22, y+r*0.22];
  bandY.forEach(by=>{
    ctx.strokeStyle='rgba(80,45,5,0.7)';
    ctx.lineWidth=r*0.10;
    ctx.beginPath();
    ctx.ellipse(x,by,r,r*0.13,0,0,Math.PI*2);
    ctx.stroke();
  });
  // Strniste dole
  ctx.strokeStyle='rgba(160,120,30,0.7)';
  ctx.lineWidth=r*0.05;
  for(let i=-3;i<=3;i++){
    const bx=x+i*r*0.22;
    ctx.beginPath();
    ctx.moveTo(bx, y+r*0.75);
    ctx.lineTo(bx+r*0.06*(i%2?1:-1), y+r*1.05);
    ctx.stroke();
  }
  // Tmava spodni cast (stin na zemi)
  const gShadow=ctx.createRadialGradient(x,y+r*0.85,0,x,y+r*0.85,r*0.7);
  gShadow.addColorStop(0,'rgba(0,0,0,0.28)');
  gShadow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gShadow;
  ctx.beginPath();
  ctx.ellipse(x,y+r*0.9,r*0.7,r*0.2,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHole(){
  flagWave+=0.05;
  const hx=holePos.x,hy=holePos.y;
  const hr=Math.round(fw.w*0.055);
  // glow
  const glow=ctx.createRadialGradient(hx,hy,0,hx,hy,hr*3);
  glow.addColorStop(0,'rgba(255,255,255,0.1)');glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(hx,hy,hr*3,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
  // hole
  ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
  ctx.strokeStyle='#1a3a1a';ctx.lineWidth=2;ctx.stroke();
  // pole
  const ph=Math.round(fw.w*0.14);
  ctx.strokeStyle='#ccc';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx,hy-ph);ctx.stroke();
  // flag
  const fw2=Math.round(ph*0.55);
  ctx.fillStyle='#ff2222';ctx.beginPath();
  ctx.moveTo(hx,hy-ph);
  ctx.lineTo(hx+fw2,hy-ph+fw2*0.45+Math.sin(flagWave)*2);
  ctx.lineTo(hx,hy-ph+fw2*0.9);
  ctx.closePath();ctx.fill();
  // number
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.round(fw2*0.55)}px Nunito`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(holeIdx+1,hx+fw2*0.5,hy-ph+fw2*0.45);
}
function drawBall(){
  const r=ball.r;
  // shadow
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(ball.x+2,ball.y+4,r*0.9,r*0.45,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.30)';ctx.fill();
  ctx.restore();
  // clip to circle then draw logo
  ctx.save();
  ctx.beginPath();ctx.arc(ball.x,ball.y,r,0,Math.PI*2);ctx.clip();
  if(logoImg.complete && logoImg.naturalWidth>0){
    ctx.drawImage(logoImg, ball.x-r, ball.y-r, r*2, r*2);
  } else {
    // fallback plain white circle
    ctx.fillStyle='#fff';ctx.fill();
  }
  // subtle border ring
  ctx.restore();
  ctx.save();
  ctx.beginPath();ctx.arc(ball.x,ball.y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  if(gameState==='aiming'){
    if(touchActive){
      powerOsc+=OSC_SPEED*powerDir;
      if(powerOsc>=1){powerOsc=1;powerDir=-1;}
      if(powerOsc<=0){powerOsc=0;powerDir=1;}
      document.getElementById('powerbar-fill').style.width=(powerOsc*100)+'%';
    }
    if(Math.hypot(ball.vx,ball.vy)>0.05) stepPhysics();
    tickP();
  }
  if(gameState==='holed'){
    tickP();successTick--;
    if(successTick<=0){holeIdx++;if(holeIdx>=HOLE_DEFS.length)showEnd();else initHole();}
  }
  if(gameState==='aiming'||gameState==='holed') draw();
}

// ═══════════════════════════════════════════════════════
function showEnd(){
  gameState='end';
  const par=HOLE_DEFS.length*3,tot=scoreLog.reduce((a,s)=>a+s.strokes,0),diff=tot-par;
  let v='',vc='#fff';
  if(diff<=-4){v='🏆 Profík!';vc='#ffd700';}
  else if(diff<=0){v='⭐ Výborně!';vc='#7ee87e';}
  else if(diff<=4){v='👍 Dobrá hra!';vc='#aaa';}
  else{v='😄 Příště lépe!';vc='#ff9966';}
  const rows=scoreLog.map(s=>{
    const c=s.diff<0?'#7ee87e':s.diff>0?'#ff6666':'#fff';
    const l=s.diff<0?`(${s.diff})`:s.diff>0?`(+${s.diff})`:'(par)';
    return`<div><span>Jamka ${s.hole}</span><span style="color:${c}">${s.strokes} úd. ${l}</span></div>`;
  }).join('');
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="verdict" style="color:${vc}">${v}</div>
    <p style="color:#ccc;font-size:.8rem">Celkem <b>${tot}</b> úderů | Par ${par} | Skóre ${diff>=0?'+':''}${diff}</p>
    <div class="scorebox">${rows}</div>
    <p style="color:#5a9a5a;font-size:.68rem;text-align:center">Přijď zahrát naživo!<br>🌿 Sportpark Pavlišov</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="startBtn">HRÁT ZNOVU</button>
      <button class="btn-share" id="shareBtn">📸 SDÍLET VÝSLEDEK</button>
    </div>
    <div id="share-panel">
      <img id="share-preview" alt="výsledková karta"/>
      <div class="share-btns">
        <a id="sbtn-save" class="sbtn sbtn-save" download="fotbalgolf-vysledek.png">💾 ULOŽIT FOTO</a>
        <a id="sbtn-wa"   class="sbtn sbtn-wa"   target="_blank" rel="noopener">💬 WHATSAPP</a>
        <a id="sbtn-ig"   class="sbtn sbtn-ig"   target="_blank" rel="noopener">📸 IG STORY</a>
        <a id="sbtn-fb"   class="sbtn sbtn-fb"   target="_blank" rel="noopener">📘 FB STORY</a>
      </div>
      <p style="color:#3a6a3a;font-size:0.6rem;text-align:center;margin:0">Ulož foto → otevři IG/FB → Nová story → nahraj z galerie</p>
    </div>
    <div class="site">fotbalgolfpavlisov.cz</div>`;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',startGame);
  document.getElementById('shareBtn').addEventListener('click',()=>showSharePanel(tot,diff,v));
}

function createShareImage(tot, diff, verdict){
  // Formát 9:16 pro story (1080x1920 → škálujeme na 540x960)
  const CW=540, CH=960;
  const sc=document.createElement('canvas');
  sc.width=CW; sc.height=CH;
  const cx=sc.getContext('2d');

  // ── Pozadí – tmavý gradient ──
  const bg=cx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#061206');
  bg.addColorStop(0.5,'#0d2a0d');
  bg.addColorStop(1,'#061206');
  cx.fillStyle=bg; cx.fillRect(0,0,CW,CH);

  // ── Dekorativní šestiúhelníkové kolečka (travní vzor) ──
  cx.globalAlpha=0.04;
  cx.fillStyle='#7ee87e';
  for(let row=0;row<20;row++){
    for(let col=0;col<8;col++){
      const ox=col%2===0?0:35;
      cx.beginPath();
      cx.arc(col*70+ox, row*70-20, 28, 0, Math.PI*2);
      cx.fill();
    }
  }
  cx.globalAlpha=1;

  // ── Zelený pás nahoře ──
  const topH=180;
  const grass=cx.createLinearGradient(0,0,0,topH);
  grass.addColorStop(0,'#1a5a1a');
  grass.addColorStop(1,'#0d2a0d');
  cx.fillStyle=grass;
  cx.beginPath();
  cx.moveTo(0,0); cx.lineTo(CW,0); cx.lineTo(CW,topH-30);
  cx.quadraticCurveTo(CW/2, topH+10, 0, topH-30);
  cx.closePath(); cx.fill();

  // ── Zelený pás dole ──
  const botY=CH-160;
  const grassB=cx.createLinearGradient(0,botY,0,CH);
  grassB.addColorStop(0,'#0d2a0d');
  grassB.addColorStop(1,'#1a5a1a');
  cx.fillStyle=grassB;
  cx.beginPath();
  cx.moveTo(0,botY+30); cx.quadraticCurveTo(CW/2,botY-10,CW,botY+30);
  cx.lineTo(CW,CH); cx.lineTo(0,CH); cx.closePath(); cx.fill();

  // ── Logo ──
  cx.textAlign='center';
  cx.font='bold 28px "Nunito", sans-serif';
  cx.fillStyle='rgba(126,232,126,0.7)';
  cx.fillText('⚽  FOTBALGOLF  ⚽', CW/2, 55);
  cx.font='bold 16px "Nunito", sans-serif';
  cx.fillStyle='rgba(90,154,90,0.8)';
  cx.fillText('SPORTPARK PAVLIŠOV', CW/2, 82);

  // ── Tenká linka ──
  cx.strokeStyle='rgba(126,232,126,0.25)';
  cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(60,100); cx.lineTo(CW-60,100); cx.stroke();

  // ── "Zahrál jsem" label ──
  cx.font='bold 20px "Nunito", sans-serif';
  cx.fillStyle='rgba(255,255,255,0.55)';
  cx.fillText('ZAHRÁL JSEM', CW/2, 148);

  // ── Verdict ──
  const verdColor=diff<=-4?'#ffd700':diff<=0?'#7ee87e':diff<=4?'#cccccc':'#ff9966';
  cx.font='bold 48px "Bebas Neue", Impact, sans-serif';
  cx.fillStyle=verdColor;
  cx.shadowColor=verdColor; cx.shadowBlur=30;
  cx.fillText(verdict, CW/2, 200);
  cx.shadowBlur=0;

  // ── Velká čísla skóre ──
  const scoreStr=diff>0?'+'+diff:String(diff);
  const scoreColor=diff<0?'#7ee87e':diff===0?'#ffffff':'#ff6666';

  // Kruh za skóre
  const circR=130;
  const circGrad=cx.createRadialGradient(CW/2,360,0,CW/2,360,circR);
  circGrad.addColorStop(0,'rgba(42,90,42,0.5)');
  circGrad.addColorStop(1,'rgba(13,42,13,0)');
  cx.fillStyle=circGrad;
  cx.beginPath(); cx.arc(CW/2,360,circR,0,Math.PI*2); cx.fill();

  cx.font='bold 150px "Bebas Neue", Impact, sans-serif';
  cx.fillStyle=scoreColor;
  cx.shadowColor=scoreColor; cx.shadowBlur=40;
  cx.fillText(scoreStr, CW/2, 420);
  cx.shadowBlur=0;
  cx.font='bold 18px "Nunito", sans-serif';
  cx.fillStyle='rgba(255,255,255,0.45)';
  cx.fillText('SKÓRE', CW/2, 448);

  // ── 3 stat boxy ──
  const stats=[
    {l:'ÚDERŮ',v:String(tot)},
    {l:'PAR',   v:String(HOLE_DEFS.length*3)},
    {l:'JAMEK', v:String(HOLE_DEFS.length)},
  ];
  const bw=140, bh=80, bgap=12;
  const bTotalW=stats.length*(bw+bgap)-bgap;
  const bx0=(CW-bTotalW)/2;
  stats.forEach((s,i)=>{
    const bx=bx0+i*(bw+bgap), by=490;
    const bbg=cx.createLinearGradient(bx,by,bx,by+bh);
    bbg.addColorStop(0,'rgba(42,90,42,0.55)');
    bbg.addColorStop(1,'rgba(13,42,13,0.55)');
    cx.fillStyle=bbg;
    cx.beginPath(); cx.roundRect(bx,by,bw,bh,12); cx.fill();
    cx.strokeStyle='rgba(126,232,126,0.2)'; cx.lineWidth=1; cx.stroke();
    cx.font='bold 11px "Nunito", sans-serif';
    cx.fillStyle='rgba(255,255,255,0.45)';
    cx.fillText(s.l, bx+bw/2, by+20);
    cx.font='bold 38px "Bebas Neue", Impact, sans-serif';
    cx.fillStyle='#7ee87e';
    cx.fillText(s.v, bx+bw/2, by+62);
  });

  // ── Datum ──
  const now=new Date();
  const d=now.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});
  cx.font='13px "Nunito", sans-serif';
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.fillText(d, CW/2, 598);

  // ── Fotbalgolf ikonka (míč) uprostřed ──
  cx.font='64px serif';
  cx.fillStyle='#fff';
  cx.globalAlpha=0.12;
  cx.fillText('⛳', CW/2, 720);
  cx.globalAlpha=1;

  // ── CTA ──
  cx.font='bold 22px "Nunito", sans-serif';
  cx.fillStyle='rgba(255,255,255,0.75)';
  cx.fillText('Dokážeš mě porazit?', CW/2, 790);
  cx.font='bold 16px "Nunito", sans-serif';
  cx.fillStyle='rgba(255,255,255,0.5)';
  cx.fillText('Zkus i ty hru na:', CW/2, 820);

  // URL box
  const urlBg=cx.createLinearGradient(80,838,CW-80,838);
  urlBg.addColorStop(0,'rgba(42,106,42,0)');
  urlBg.addColorStop(0.3,'rgba(42,106,42,0.6)');
  urlBg.addColorStop(0.7,'rgba(42,106,42,0.6)');
  urlBg.addColorStop(1,'rgba(42,106,42,0)');
  cx.fillStyle=urlBg;
  cx.beginPath(); cx.roundRect(80,838,CW-160,52,26); cx.fill();
  cx.font='bold 22px "Bebas Neue", Impact, sans-serif';
  cx.fillStyle='#7ee87e';
  cx.shadowColor='#7ee87e'; cx.shadowBlur=12;
  cx.fillText('www.fotbalgolfpavlisov.cz/hra', CW/2, 872);
  cx.shadowBlur=0;

  // ── Spodní linka ──
  const lineGrad=cx.createLinearGradient(0,0,CW,0);
  lineGrad.addColorStop(0,'rgba(126,232,126,0)');
  lineGrad.addColorStop(0.5,'rgba(126,232,126,0.6)');
  lineGrad.addColorStop(1,'rgba(126,232,126,0)');
  cx.strokeStyle=lineGrad; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(0,CH-8); cx.lineTo(CW,CH-8); cx.stroke();

  return sc;
}

function showSharePanel(tot, diff, verdict){
  // Vygeneruj obrázek
  const sc=createShareImage(tot,diff,verdict);
  const dataUrl=sc.toDataURL('image/png');

  // Zobraz preview
  const panel=document.getElementById('share-panel');
  const preview=document.getElementById('share-preview');
  preview.src=dataUrl;
  panel.style.display='flex';

  // Skrýt tlačítko sdílet (panel ho nahrazuje)
  const shareBtn=document.getElementById('shareBtn');
  if(shareBtn) shareBtn.style.display='none';

  // Nastavit Save link
  document.getElementById('sbtn-save').href=dataUrl;

  // WhatsApp text
  const scoreStr=diff>0?'+'+diff:String(diff);
  const waText=`⚽ Zahrál jsem FotbalGolf Pavlišov! Skóre: ${scoreStr} (${tot} úderů). Dokážeš mě porazit? → www.fotbalgolfpavlisov.cz/hra`;
  document.getElementById('sbtn-wa').href='https://wa.me/?text='+encodeURIComponent(waText);

  // Instagram Story – otevře IG (na mobilu), uživatel přidá foto z galerie
  document.getElementById('sbtn-ig').href='instagram://story-camera';
  document.getElementById('sbtn-ig').addEventListener('click', function(){
    // Zkusit nativní share s file (moderní mobily)
    sc.toBlob(async blob=>{
      const file=new File([blob],'fotbalgolf.png',{type:'image/png'});
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], title:'FotbalGolf výsledek'}); return; }catch(e){}
      }
      // Fallback: stáhnout a otevřít IG
      const a=document.createElement('a');
      a.href=dataUrl; a.download='fotbalgolf-vysledek.png'; a.click();
      setTimeout(()=>{ window.location.href='instagram://story-camera'; },800);
    },'image/png');
  },{once:true});

  // Facebook Story
  document.getElementById('sbtn-fb').href='fb://composer/';
  document.getElementById('sbtn-fb').addEventListener('click', function(){
    sc.toBlob(async blob=>{
      const file=new File([blob],'fotbalgolf.png',{type:'image/png'});
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], title:'FotbalGolf výsledek'}); return; }catch(e){}
      }
      const a=document.createElement('a');
      a.href=dataUrl; a.download='fotbalgolf-vysledek.png'; a.click();
      setTimeout(()=>{ window.open('https://www.facebook.com/','_blank'); },800);
    },'image/png');
  },{once:true});
}

//  IFRAME EMBED HELPER
// ═══════════════════════════════════════════════════════
// Pokud je hra v iframe – řekni rodiči ať zvětší iframe na celou výšku okna
(function(){
  try {
    if(window.parent !== window){
      // jsme v iframe – pošleme výšku nahoru
      function tellParent(){
        window.parent.postMessage({type:'fotbalgolf-height', height: window.innerHeight},'*');
      }
      tellParent();
      window.addEventListener('resize', tellParent);
    }
  } catch(e){}
})();

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
function getPos(e){
  const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}
function onDown(e){
  e.preventDefault();
  if(gameState!=='aiming')return;
  if(Math.hypot(ball.vx,ball.vy)>0.3)return;
  const p=getPos(e);
  mouseAngle=Math.atan2(p.y-ball.y,p.x-ball.x);
  touchActive=true;powerOsc=0;powerDir=1;
}
function onMove(e){
  e.preventDefault();
  if(!touchActive)return;
  const p=getPos(e);
  mouseAngle=Math.atan2(p.y-ball.y,p.x-ball.x);
}
function onUp(e){
  e.preventDefault();
  if(!touchActive)return;
  touchActive=false;
  document.getElementById('powerbar-fill').style.width='0%';
  if(gameState!=='aiming'||Math.hypot(ball.vx,ball.vy)>0.3||powerOsc<0.02)return;
  ball.vx=Math.cos(mouseAngle)*powerOsc*14;
  ball.vy=Math.sin(mouseAngle)*powerOsc*14;
  strokes++;
  spawnP(ball.x,ball.y,'#fff',8);
  powerOsc=0;
  updateHUD();
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});

// ═══════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════
function startGame(){
  holeIdx=0;totalDiff=0;scoreLog=[];
  document.getElementById('overlay').style.display='none';
  initHole();
}
document.getElementById('startBtn').addEventListener('click',startGame);
loop();
</script>
